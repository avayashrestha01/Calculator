<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator Website || Avaya Shrestha</title>
</head>
<body>
    <main>
        <span class="animation a"></span>
        <span class="animation b"></span>
        <div class="container">
            <div class="outputCont">
                <div id="output">
                    0
                </div>
            </div>
            <div class="numContainer">
                <button class="items gray">1</button>
                <button class="items gray">2</button>
                <button class="items gray">3</button>
                <button class="items orange">Del</button>
                <button class="items gray">4</button>
                <button class="items gray">5</button>
                <button class="items gray">6</button>
                <button class="items orange">+</button>
                <button class="items gray">7</button>
                <button class="items gray">8</button>
                <button class="items gray">9</button>
                <button class="items orange">-</button>
                <button class="items gray">0</button>
                <button class="items orange">/</button>
                <button class="items orange">*</button>
                <button class="items black" onclick="calculate()">=</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
